spring.application.name=backendDBP
spring.datasource.url=jdbc:postgresql://localhost:5432/mediastore
spring.datasource.username=postgres
spring.datasource.password=guest
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.type.descriptor.sql=TRACE
whitelisted.cors.urls=http://localhost:5173, http://localhost:5174, http://localhost:5175